spring:
  application:
    name: Ai-service

  mongodb:
    uri: mongodb://localhost:27017/Fitness-Recommendations
    database: Fitness-Recommendations

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8083

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

gemini:
  api:
    url: ${GEMINI_API_URL}
    key: ${GEMINI_API_KEY}